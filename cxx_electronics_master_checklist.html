let filter = 'all';
let checked = JSON.parse(localStorage.getItem('cxx_checklist')||'{}');

function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===f||(f==='all'&&b.textContent.trim()==='All')||(f==='todo'&&b.textContent.trim()==='Not done')));
  render();
}

function toggle(id){
  checked[id]=!checked[id];
  localStorage.setItem('cxx_checklist',JSON.stringify(checked));
  render();
}

function render(){
  const list=document.getElementById('list');
  let total=0,done=0;
  let html='';

  phases.forEach(phase=>{
    const items=phase.items.filter(item=>{
      const id=phase.id+':'+item.text;
      if(filter==='todo') return !checked[id];
      if(filter==='all') return true;
      return item.tag===filter;
    });
    if(!items.length) return;

    const phaseDone=items.filter(i=>checked[phase.id+':'+i.text]).length;
    total+=items.length;
    done+=phaseDone;

    html+=`<div class="phase">
      <div class="phase-header">
        <span class="phase-title">${phase.label}</span>
        <span class="phase-count">${phaseDone}/${items.length}</span>
      </div>
      <div class="items">`;

    items.forEach(item=>{
      const id=phase.id+':'+item.text;
      const isDone=!!checked[id];
      const tagLabel={dev:'Dev',db:'Database',n8n:'n8n',client:'Client',deploy:'Deploy'}[item.tag]||item.tag;
      html+=`<div class="item${isDone?' done':''}" onclick="toggle('${id.replace(/'/g,"\\'")}')">
        <div class="checkbox${isDone?' checked':''}"></div>
        <span class="item-text">${item.text}</span>
        <span class="item-tag tag-${item.tag}">${tagLabel}</span>
      </div>`;
    });

    html+=`</div></div>`;
  });

  list.innerHTML=html;

  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${done} / ${total} done (${pct}%)`;
}
